<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>請觀看下列影片</title>
    
    <!-- 引入 Swiper.js 的 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: sans-serif;
            background-color: #000;
            overflow: hidden;
        }

        /* 啟動畫面 */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #121212;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            transition: opacity 0.5s ease;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 20px;
            background-color: #fff;
            color: #000;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }

        /* Swiper 容器設定 */
        .swiper {
            width: 100vw;
            height: 100vh;
        }

        .swiper-slide {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* YouTube 播放器容器：確保充滿螢幕但不可點擊（由上層透明區塊攔截滑動事件） */
        .yt-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* 重要：防止 iframe 吃掉 Swiper 的滑動手勢 */
        }
        
        /* 稍微放大 iframe，隱藏 YouTube 預設的上下黑邊或控制列 */
        .yt-container iframe {
            width: 150vw; 
            height: 150vh;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        /* 影片提示文字 */
        .video-label {
            position: absolute;
            bottom: 50px;
            left: 20px;
            font-size: 32px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            z-index: 10;
        }
    </style>
</head>
<body>

    <!-- 啟動畫面 -->
    <div id="start-screen">
        <h2>歡迎來到我的影片 App</h2>
        <button id="start-btn">開始觀看</button>
    </div>

    <!-- Swiper 影片輪播區塊 -->
    <div class="swiper mySwiper">
        <div class="swiper-wrapper">
            
            <!-- 影片 A -->
            <!-- data-vid 填入 YouTube 影片網址 v= 後面的那串代碼 -->
            <div class="swiper-slide" data-vid="pNY7KEhKrhA">
                <div class="yt-container" id="player-0"></div>
                <div class="video-label">影片 A</div>
            </div>

            <!-- 影片 B -->
            <div class="swiper-slide" data-vid="t4LoRTn1wZs">
                <div class="yt-container" id="player-1"></div>
                <div class="video-label">影片 B</div>
            </div>

            <!-- 影片 C -->
            <div class="swiper-slide" data-vid="iO80kVybDL8">
                <div class="yt-container" id="player-2"></div>
                <div class="video-label">影片 C</div>
            </div>

        </div>
    </div>

    <!-- 引入 Swiper.js -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <!-- 引入 YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let players = [];
        let swiperInstance;
        let isApiReady = false;

        // 當 YouTube API 載入完成時，會自動呼叫這個函式
        function onYouTubeIframeAPIReady() {
            isApiReady = true;
            const slides = document.querySelectorAll('.swiper-slide');
            
            // 為每個 slide 建立 YouTube 播放器實例
            slides.forEach((slide, index) => {
                const videoId = slide.getAttribute('data-vid');
                players[index] = new YT.Player(`player-${index}`, {
                    videoId: videoId,
                    playerVars: {
                        'autoplay': 0,
                        'controls': 0,      // 隱藏控制列
                        'rel': 0,           // 結束時不顯示相關影片
                        'showinfo': 0,      // 隱藏影片標題
                        'modestbranding': 1,
                        'loop': 1,          // 循環播放
                        'playlist': videoId, // loop 必須配合 playlist 參數
                        'mute': 0,
                        'playsinline': 1    // iOS 不強制全螢幕
                    }
                });
            });
            
            initSwiper();
        }

        function initSwiper() {
            swiperInstance = new Swiper('.mySwiper', {
                direction: 'vertical',
                loop: true,
                on: {
                    slideChangeTransitionEnd: function () {
                        playActiveYouTubeVideo();
                    }
                }
            });
        }

        function playActiveYouTubeVideo() {
            // 先暫停所有 YouTube 影片並回到開頭
            players.forEach(player => {
                if (player && typeof player.pauseVideo === 'function') {
                    player.pauseVideo();
                    player.seekTo(0);
                }
            });

            // Swiper 無限循環時，DOM 結構會複製 slide，我們需要找到當下畫面中 active 的索引
            // 由於複製的 slide 沒有被 YT API 綁定，最簡單的方式是利用 realIndex
            const activeIndex = swiperInstance.realIndex;
            
            if (players[activeIndex] && typeof players[activeIndex].playVideo === 'function') {
                 players[activeIndex].playVideo();
            }
        }

        // 啟動按鈕
        document.getElementById('start-btn').addEventListener('click', function() {
            if (!isApiReady) {
                alert("YouTube API 載入中，請稍候再試。");
                return;
            }

            const startScreen = document.getElementById('start-screen');
            startScreen.style.opacity = '0';
            setTimeout(() => {
                startScreen.style.display = 'none';
            }, 500);

            playActiveYouTubeVideo();
        });
    </script>

</body>
</html>
