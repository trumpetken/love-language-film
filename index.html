<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 這行 meta viewport 是手機版網頁的關鍵，確保比例正確 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的影片 App</title>
    <style>
        /* CSS 樣式區塊 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background-color: #1e1e1e;
            color: white;
        }

        .header {
            text-align: center;
            padding: 20px 0;
            font-size: 20px;
            background-color: #121212;
        }

        .video-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
        }

        /* 影片縮圖狀態 */
        .video-wrapper {
            position: relative;
            width: 100%;
            height: 200px; /* 手機上的預設高度 */
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* 讓影片填滿縮圖區塊 */
        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            pointer-events: none; /* 縮小狀態時，禁止點擊原生播放條，交由 JS 控制 */
        }

        /* 縮圖上的文字標籤 */
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.4);
            font-size: 24px;
            font-weight: bold;
            pointer-events: none; /* 確保點擊事件能穿透到 wrapper */
        }

        /* --- 點擊放大後的全螢幕狀態 --- */
        .video-wrapper.active {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1000;
            border-radius: 0;
            background-color: #000;
        }

        .video-wrapper.active video {
            object-fit: contain; /* 放大後顯示影片完整比例，不裁切 */
            pointer-events: auto; /* 允許使用者操作原生的播放、暫停進度條 */
        }

        .video-wrapper.active .overlay {
            display: none; /* 放大後隱藏文字標籤 */
        }

        /* 關閉按鈕，預設隱藏 */
        .close-btn {
            display: none;
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.3);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 16px;
            z-index: 1001;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        /* 只有在 active 狀態時才顯示關閉按鈕 */
        .video-wrapper.active .close-btn {
            display: block;
        }
    </style>
</head>
<body>

    <div class="header">選擇要觀看的影片</div>

    <div class="video-container">
        <!-- 影片 A -->
        <div class="video-wrapper">
            <!-- src 請替換成你實際的影片路徑，例如 A.mp4 -->
            <video src="https://www.dropbox.com/scl/fi/nxp5hk7xntgy25dr59t7q/A.mp4?rlkey=94fs4i03u1qvi9gncg5avktmk&raw=1"></video>
            <div class="overlay">影片 A</div>
        </div>

        <!-- 影片 B -->
        <div class="video-wrapper">
            <video src="https://www.dropbox.com/scl/fi/45n36cethmyrdex108kk9/B.mp4?rlkey=pm7pxehqt04gdr4srgw5b0jya&raw=1"></video>
            <div class="overlay">影片 B</div>
        </div>

        <!-- 影片 C -->
        <div class="video-wrapper">
            <video src="https://www.dropbox.com/scl/fi/s5r1ky9mkhqa93bpbpyf5/C.mp4?rlkey=kqp80o9qjj4fd6ec8zacgmxtw&raw=1" controls playsinline></video>
            <div class="overlay">影片 C</div>
        </div>
    </div>

    <script>
        // JavaScript 互動邏輯區塊
        const wrappers = document.querySelectorAll('.video-wrapper');

        wrappers.forEach(wrapper => {
            // 動態為每個影片區塊加入「關閉」按鈕
            const closeBtn = document.createElement('button');
            closeBtn.classList.add('close-btn');
            closeBtn.innerText = '✕ 關閉';
            wrapper.appendChild(closeBtn);

            const video = wrapper.querySelector('video');

            // 1. 點擊縮圖：放大影片並播放
            wrapper.addEventListener('click', function() {
                // 如果已經是放大狀態，就不重複執行
                if (this.classList.contains('active')) return;

                // 將當前點擊的影片加上 active 類別（觸發全螢幕 CSS）
                this.classList.add('active');
                
                // 開始播放影片 (加入一點延遲確保畫面展開後再播)
                setTimeout(() => {
                    video.play();
                }, 150);
            });

            // 2. 點擊關閉按鈕：縮小影片並暫停
            closeBtn.addEventListener('click', function(e) {
                e.stopPropagation(); // 阻止事件冒泡，以免同時觸發到下方的 wrapper 點擊事件
                
                wrapper.classList.remove('active'); // 移除全螢幕 CSS
                video.pause(); // 暫停播放
            });
        });
    </script>

</body>
</html>
