<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的 YouTube Shorts 滑動 App</title>
    
    <!-- 引入 Swiper.js 的 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: sans-serif;
            background-color: #000;
            overflow: hidden; /* 防止原生滾動，交由 Swiper 處理 */
        }

        /* 啟動畫面：突破瀏覽器自動播放限制 */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #121212;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            transition: opacity 0.5s ease;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 20px;
            background-color: #fff;
            color: #000;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }

        /* Swiper 容器設定為全螢幕 */
        .swiper {
            width: 100vw;
            height: 100vh;
        }

        .swiper-slide {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* YouTube 播放器容器 */
        .yt-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* 重要：防止 iframe 吃掉 Swiper 的滑動手勢 */
        }
        
        /* Shorts 專用設定：設定為 100% 寬高置中 */
        .yt-container iframe {
            width: 100vw; 
            height: 100vh;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        /* 影片提示文字 */
        .video-label {
            position: absolute;
            bottom: 50px;
            left: 20px;
            font-size: 32px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            z-index: 10;
        }
    </style>
</head>
<body>

    <!-- 啟動畫面 -->
    <div id="start-screen">
        <h2>歡迎來到 Shorts 滑動 App</h2>
        <button id="start-btn">開始觀看</button>
    </div>

    <!-- Swiper 影片輪播區塊 -->
    <div class="swiper mySwiper">
        <div class="swiper-wrapper">
            
            <!-- 影片 A -->
            <div class="swiper-slide" data-vid="RgAFcjsIZTo">
                <div class="yt-container" id="player-0"></div>
                <div class="video-label">影片 A</div>
            </div>

            <!-- 影片 B -->
            <div class="swiper-slide" data-vid="6FBsVyQU-u4">
                <div class="yt-container" id="player-1"></div>
                <div class="video-label">影片 B</div>
            </div>

            <!-- 影片 C -->
            <div class="swiper-slide" data-vid="F-KB_lehT6M">
                <div class="yt-container" id="player-2"></div>
                <div class="video-label">影片 C</div>
            </div>

        </div>
    </div>

    <!-- 引入 Swiper.js -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <!-- 引入 YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let players = [];
        let swiperInstance;
        let isApiReady = false;

        // 當 YouTube API 載入完成時，會自動呼叫這個函式
        function onYouTubeIframeAPIReady() {
            isApiReady = true;
            const slides = document.querySelectorAll('.swiper-slide');
            
            // 為每個 slide 建立 YouTube 播放器實例
            slides.forEach((slide, index) => {
                const videoId = slide.getAttribute('data-vid');
                players[index] = new YT.Player(`player-${index}`, {
                    videoId: videoId,
                    playerVars: {
                        'autoplay': 0,
                        'controls': 0,      // 隱藏控制列
                        'rel': 0,           // 結束時不顯示相關影片
                        'showinfo': 0,      // 隱藏影片標題
                        'modestbranding': 1,
                        'loop': 1,          // 單支影片播完會自動重播
                        'playlist': videoId, // loop 必須配合 playlist 參數
                        'mute': 0,
                        'playsinline': 1,   // iOS 不強制全螢幕
                        'origin': window.location.origin // 加上網域來源，避免 153 錯誤
                    }
                });
            });
            
            initSwiper();
        }

        // 初始化 Swiper
        function initSwiper() {
            swiperInstance = new Swiper('.mySwiper', {
                direction: 'vertical', // 垂直滑動
                rewind: true,          // 【修改點1】改為快速回捲，防止 YouTube 重新載入死機
                on: {
                    slideChangeTransitionEnd: function () {
                        playActiveYouTubeVideo();
                    }
                }
            });
        }

        // 控制影片播放與暫停
        function playActiveYouTubeVideo() {
            // 取得當前畫面的實際索引 (改用 activeIndex)
            const activeIndex = swiperInstance.activeIndex;

            // 【修改點2】針對「非當前畫面」的其他影片，只做暫停，不強制拉回 0 秒
            players.forEach((player, index) => {
                if (player && typeof player.pauseVideo === 'function') {
                    if (index !== activeIndex) {
                        player.pauseVideo();
                    }
                }
            });

            // 【修改點2】針對「當前畫面」的影片，回到 0 秒後再播放
            if (players[activeIndex] && typeof players[activeIndex].playVideo === 'function') {
                 players[activeIndex].seekTo(0);
                 players[activeIndex].playVideo();
            }
        }

        // 啟動按鈕事件
        document.getElementById('start-btn').addEventListener('click', function() {
            if (!isApiReady) {
                alert("YouTube API 載入中，請稍候再試。");
                return;
            }

            // 隱藏啟動畫面
            const startScreen = document.getElementById('start-screen');
            startScreen.style.opacity = '0';
            setTimeout(() => {
                startScreen.style.display = 'none';
            }, 500);

            // 開始播放第一支影片
            playActiveYouTubeVideo();
        });
    </script>

</body>
</html>
