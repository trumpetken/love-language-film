<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的滑動影片 App</title>
    
    <!-- 引入 Swiper.js 的 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: sans-serif;
            background-color: #000;
            overflow: hidden; /* 防止原生滾動，交給 Swiper 處理 */
        }

        /* 啟動畫面：用來突破瀏覽器自動播放限制 */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #121212;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            transition: opacity 0.5s ease;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 20px;
            background-color: #fff;
            color: #000;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }

        /* Swiper 容器設定為全螢幕 */
        .swiper {
            width: 100vw;
            height: 100vh;
        }

        .swiper-slide {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 影片設定為填滿螢幕 */
        .swiper-slide video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 讓影片填滿畫面，若要看到完整比例可改為 contain */
            pointer-events: none; /* 隱藏原生控制條，點擊事件交給外層 */
        }

        /* 影片提示文字 */
        .video-label {
            position: absolute;
            bottom: 50px;
            left: 20px;
            font-size: 32px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            z-index: 10;
        }
    </style>
</head>
<body>

    <!-- 啟動畫面 -->
    <div id="start-screen">
        <h2>歡迎來到我的影片 App</h2>
        <button id="start-btn">開始觀看</button>
    </div>

    <!-- Swiper 影片輪播區塊 -->
    <div class="swiper mySwiper">
        <div class="swiper-wrapper">
            
            <!-- 影片 A -->
            <div class="swiper-slide">
                <!-- 移除了 controls，並加入 loop 讓單支影片播完可以重播 -->
                <video src="https://www.dropbox.com/scl/fi/nxp5hk7xntgy25dr59t7q/A.mp4?rlkey=94fs4i03u1qvi9gncg5avktmk&raw=1" playsinline loop></video>
                <div class="video-label">影片 A</div>
            </div>

            <!-- 影片 B -->
            <div class="swiper-slide">
                <video src="https://www.dropbox.com/scl/fi/45n36cethmyrdex108kk9/B.mp4?rlkey=pm7pxehqt04gdr4srgw5b0jya&raw=1" playsinline loop></video>
                <div class="video-label">影片 B</div>
            </div>

            <!-- 影片 C -->
            <div class="swiper-slide">
                <video src="https://www.dropbox.com/scl/fi/s5r1ky9mkhqa93bpbpyf5/C.mp4?rlkey=kqp80o9qjj4fd6ec8zacgmxtw&raw=1" playsinline loop></video>
                <div class="video-label">影片 C</div>
            </div>

        </div>
    </div>

    <!-- 引入 Swiper.js 的 JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        // 1. 初始化 Swiper
        const swiper = new Swiper('.mySwiper', {
            direction: 'vertical', // 設定為垂直上下滑動
            loop: true,            // 開啟無限循環 (A->B->C->A)
            on: {
                // 當滑動切換完成時觸發
                slideChangeTransitionEnd: function () {
                    playActiveVideo();
                }
            }
        });

        // 2. 控制影片播放的函數
        function playActiveVideo() {
            // 先暫停所有的影片，並將時間歸零
            document.querySelectorAll('.swiper-slide video').forEach(video => {
                video.pause();
                video.currentTime = 0;
            });

            // 找到當前畫面上正在顯示的那個 Slide (Swiper 會自動加上 active class)
            const activeSlide = document.querySelector('.swiper-slide-active');
            if (activeSlide) {
                const activeVideo = activeSlide.querySelector('video');
                // 播放當前的影片
                if (activeVideo) {
                    activeVideo.play().catch(error => {
                        console.log("自動播放失敗，通常是因為缺少使用者互動:", error);
                    });
                }
            }
        }

        // 3. 處理「開始觀看」按鈕的點擊事件
        document.getElementById('start-btn').addEventListener('click', function() {
            // 隱藏啟動畫面
            const startScreen = document.getElementById('start-screen');
            startScreen.style.opacity = '0';
            setTimeout(() => {
                startScreen.style.display = 'none';
            }, 500);

            // 開始播放第一支影片
            playActiveVideo();
        });
    </script>

</body>
</html>
