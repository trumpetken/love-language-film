<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的 YouTube Shorts 滑動 App</title>
    
    <!-- 引入 Swiper.js 的 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: sans-serif;
            background-color: #000;
            overflow: hidden;
        }

        /* 啟動畫面 */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #121212;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            transition: opacity 0.5s ease;
        }

        /* 啟動按鈕：新增 disabled 狀態的樣式 */
        #start-btn {
            padding: 15px 40px;
            font-size: 20px;
            background-color: #fff;
            color: #000;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        #start-btn:disabled {
            background-color: #555;
            color: #aaa;
            cursor: not-allowed;
        }

        .swiper {
            width: 100vw;
            height: 100vh;
        }

        .swiper-slide {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .yt-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; 
        }
        
        .yt-container iframe {
            width: 100vw; 
            height: 100vh;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        .video-label {
            position: absolute;
            bottom: 50px;
            left: 20px;
            font-size: 32px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            z-index: 10;
        }
    </style>
</head>
<body>

    <!-- 啟動畫面：預設按鈕為 disabled -->
    <div id="start-screen">
        <h2>歡迎來到 Shorts 滑動 App</h2>
        <button id="start-btn" disabled>影片載入中...</button>
    </div>

    <!-- Swiper 影片輪播區塊 -->
    <div class="swiper mySwiper">
        <div class="swiper-wrapper">
            
            <div class="swiper-slide" data-vid="RgAFcjsIZTo">
                <div class="yt-container" id="player-0"></div>
                <div class="video-label">影片 A</div>
            </div>

            <div class="swiper-slide" data-vid="6FBsVyQU-u4">
                <div class="yt-container" id="player-1"></div>
                <div class="video-label">影片 B</div>
            </div>

            <div class="swiper-slide" data-vid="F-KB_lehT6M">
                <div class="yt-container" id="player-2"></div>
                <div class="video-label">影片 C</div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let players = [];
        let swiperInstance;
        let readyCount = 0;
        let totalVideos = 0;

        // 1. 初始化 YouTube API
        function onYouTubeIframeAPIReady() {
            const slides = document.querySelectorAll('.swiper-slide');
            totalVideos = slides.length;
            
            slides.forEach((slide, index) => {
                const videoId = slide.getAttribute('data-vid');
                players[index] = new YT.Player(`player-${index}`, {
                    videoId: videoId,
                    playerVars: {
                        'autoplay': 0,
                        'controls': 0,      
                        'rel': 0,           
                        'showinfo': 0,      
                        'modestbranding': 1,
                        'loop': 1,          
                        'playlist': videoId, 
                        'mute': 0,
                        'playsinline': 1,   
                        'origin': window.location.origin 
                    },
                    events: {
                        // 【關鍵 1】等待每一支影片都載入完成
                        'onReady': function() {
                            readyCount++;
                            // 如果全部載入完畢，才開放按鈕點擊
                            if (readyCount === totalVideos) {
                                const btn = document.getElementById('start-btn');
                                btn.innerText = '開始觀看';
                                btn.disabled = false;
                            }
                        }
                    }
                });
            });
            
            initSwiper();
        }

        // 2. 初始化 Swiper
        function initSwiper() {
            swiperInstance = new Swiper('.mySwiper', {
                direction: 'vertical',
                rewind: true, // 快速回捲，保護 YouTube iframe
                on: {
                    slideChangeTransitionEnd: function () {
                        playActiveYouTubeVideo();
                    }
                }
            });
        }

        // 3. 滑動切換時的播放控制
        function playActiveYouTubeVideo() {
            const activeIndex = swiperInstance.activeIndex;

            players.forEach((player, index) => {
                if (player && typeof player.pauseVideo === 'function') {
                    if (index !== activeIndex) {
                        player.pauseVideo();
                    }
                }
            });

            // 經過啟動畫面的「喚醒」後，所有的影片都已經解鎖，所以這裡必定可以順利 seekTo(0) 和播放
            if (players[activeIndex] && typeof players[activeIndex].playVideo === 'function') {
                 players[activeIndex].seekTo(0);
                 players[activeIndex].playVideo();
            }
        }

        // 4. 啟動按鈕事件：破解手機播放限制的魔法
        document.getElementById('start-btn').addEventListener('click', function() {
            if (readyCount < totalVideos) return;

            // 【關鍵 2：全體喚醒】利用這次真實點擊，將所有 iframe 靜音並播放，騙取瀏覽器權限
            players.forEach(player => {
                player.mute();       
                player.playVideo();  
            });

            // 【關鍵 3：恢復原狀】0.4 秒後，影片已經取得權限了，此時將非當前的影片暫停並拉回原點，同時恢復聲音
            setTimeout(() => {
                players.forEach((player, index) => {
                    player.unMute(); 
                    if (index !== swiperInstance.activeIndex) {
                        player.pauseVideo();
                        player.seekTo(0); 
                    }
                });
            }, 400);

            // 隱藏啟動畫面
            const startScreen = document.getElementById('start-screen');
            startScreen.style.opacity = '0';
            setTimeout(() => {
                startScreen.style.display = 'none';
            }, 500);
        });
    </script>

</body>
</html>
